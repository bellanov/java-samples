name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      checks: write
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle
    
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
    
    - name: Run linting (Checkstyle)
      run: ./gradlew checkstyleMain checkstyleTest
      continue-on-error: true
    
    - name: Build with Gradle
      run: ./gradlew build
    
    - name: Run tests with coverage
      run: ./gradlew test jacocoTestReport
    
    - name: Generate code coverage report summary
      run: |
        echo "## Code Coverage Report" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f "build/reports/jacoco/test/jacocoTestReport.csv" ]; then
          echo "### Coverage Summary" >> $GITHUB_STEP_SUMMARY
          tail -1 build/reports/jacoco/test/jacocoTestReport.csv >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Full report available in the artifacts." >> $GITHUB_STEP_SUMMARY
        fi
    
    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@v3
      with:
        files: ./build/reports/jacoco/test/jacocoTestReport.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
    
    - name: Archive test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: test-results
        path: build/reports/tests/test/
    
    - name: Archive code coverage results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: code-coverage-report
        path: build/reports/jacoco/test/
    
    - name: Publish test results
      if: always()
      uses: EnricoMi/publish-unit-test-result-action@v2
      with:
        files: build/test-results/test/*.xml
        check_name: Test Results
      continue-on-error: true
